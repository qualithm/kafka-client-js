# Integration Test Infrastructure
#
# Usage (pick one):
#   docker compose --profile redpanda up -d
#   docker compose --profile kafka up -d
#   docker compose --profile kafka-sasl up -d
#
# Tear down: docker compose down -v

services:
  redpanda:
    profiles: [redpanda]
    image: redpandadata/redpanda:v26.1.2
    command:
      - redpanda
      - start
      - --kafka-addr internal://0.0.0.0:9093,external://0.0.0.0:9092
      - --advertise-kafka-addr internal://redpanda:9093,external://localhost:9092
      - --smp 1
      - --memory 512M
      - --mode dev-container
      - --default-log-level=warn
    ports:
      - "9092:9092"
    healthcheck:
      test: rpk cluster health --api-urls localhost:9644 | grep -qi 'healthy.*true' || exit 1
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  kafka:
    profiles: [kafka]
    image: apache/kafka:4.2.0
    hostname: kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
      KAFKA_LOG_DIRS: /tmp/kraft-combined-logs
    ports:
      - "9092:9092"
    healthcheck:
      test:
        /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 > /dev/null
        2>&1 || exit 1
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 15s

  kafka-sasl:
    profiles: [kafka-sasl]
    image: apache/kafka:4.2.0
    hostname: kafka-sasl
    ports:
      - "9094:9094"
    healthcheck:
      test: >-
        /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9094
        --command-config /tmp/admin.properties > /dev/null 2>&1 || exit 1
      interval: 5s
      timeout: 10s
      retries: 15
      start_period: 25s
    entrypoint:
      - /bin/sh
      - -c
      - |
        # Write JAAS config file
        cat > /tmp/kafka_server_jaas.conf <<'JAAS'
        KafkaServer {
            org.apache.kafka.common.security.plain.PlainLoginModule required
            username="admin"
            password="admin-secret"
            user_admin="admin-secret"
            user_testuser="testpassword";

            org.apache.kafka.common.security.scram.ScramLoginModule required;
        };
        JAAS

        # Write server.properties
        cat > /tmp/kraft-server.properties <<'PROPS'
        node.id=1
        process.roles=broker,controller
        controller.quorum.voters=1@localhost:9093
        listeners=SASL_PLAINTEXT://0.0.0.0:9094,CONTROLLER://0.0.0.0:9093
        advertised.listeners=SASL_PLAINTEXT://localhost:9094
        listener.security.protocol.map=SASL_PLAINTEXT:SASL_PLAINTEXT,CONTROLLER:PLAINTEXT
        controller.listener.names=CONTROLLER
        inter.broker.listener.name=SASL_PLAINTEXT
        sasl.enabled.mechanisms=PLAIN,SCRAM-SHA-256,SCRAM-SHA-512
        sasl.mechanism.inter.broker.protocol=PLAIN
        listener.name.sasl_plaintext.plain.sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret" user_admin="admin-secret" user_testuser="testpassword";
        listener.name.sasl_plaintext.scram-sha-256.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required;
        listener.name.sasl_plaintext.scram-sha-512.sasl.jaas.config=org.apache.kafka.common.security.scram.ScramLoginModule required;
        offsets.topic.replication.factor=1
        transaction.state.log.replication.factor=1
        transaction.state.log.min.isr=1
        group.initial.rebalance.delay.ms=0
        log.dirs=/tmp/kraft-combined-logs
        PROPS

        # Create admin properties for CLI tools
        cat > /tmp/admin.properties <<'ADMIN'
        security.protocol=SASL_PLAINTEXT
        sasl.mechanism=PLAIN
        sasl.jaas.config=org.apache.kafka.common.security.plain.PlainLoginModule required username="admin" password="admin-secret";
        ADMIN

        export KAFKA_OPTS="-Djava.security.auth.login.config=/tmp/kafka_server_jaas.conf"

        # Format storage if needed
        CLUSTER_ID="sasl-test-cluster01"
        /opt/kafka/bin/kafka-storage.sh format -t "$$CLUSTER_ID" -c /tmp/kraft-server.properties --ignore-formatted 2>/dev/null || true

        # Start Kafka in the background
        /opt/kafka/bin/kafka-server-start.sh /tmp/kraft-server.properties &
        PID=$$!

        # Wait for broker to be ready then create SCRAM users
        echo "Waiting for SASL broker to start..."
        i=0
        while [ $$i -lt 60 ]; do
          if /opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9094 --command-config /tmp/admin.properties > /dev/null 2>&1; then
            echo "Broker is ready, creating SCRAM users..."
            /opt/kafka/bin/kafka-configs.sh --bootstrap-server localhost:9094 \
              --command-config /tmp/admin.properties \
              --alter --add-config 'SCRAM-SHA-256=[password=testpassword]' \
              --entity-type users --entity-name testuser
            /opt/kafka/bin/kafka-configs.sh --bootstrap-server localhost:9094 \
              --command-config /tmp/admin.properties \
              --alter --add-config 'SCRAM-SHA-512=[password=testpassword]' \
              --entity-type users --entity-name testuser
            echo "SCRAM users created successfully"
            break
          fi
          i=$$((i + 1))
          sleep 1
        done

        # Wait for Kafka process
        wait $$PID
